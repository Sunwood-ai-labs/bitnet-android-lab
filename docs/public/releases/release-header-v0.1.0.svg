<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">bitnet-android-lab release header v0.1.0</title>
  <desc id="desc">A release banner for bitnet-android-lab v0.1.0 showing the project branding, Android device motif, and release highlights.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111d"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1088" cy="98" r="112" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="1110" cy="520" r="132" fill="#22c55e" opacity="0.08"/>
  <rect x="76" y="72" width="360" height="486" rx="48" fill="#111827" stroke="#38bdf8" stroke-width="10"/>
  <rect x="108" y="110" width="296" height="324" rx="28" fill="#e0f2fe"/>
  <rect x="198" y="484" width="116" height="14" rx="7" fill="#7dd3fc"/>
  <rect x="150" y="164" width="64" height="64" rx="16" fill="#0284c7"/>
  <rect x="232" y="164" width="64" height="64" rx="16" fill="#22c55e"/>
  <rect x="314" y="164" width="64" height="64" rx="16" fill="#0284c7"/>
  <rect x="150" y="268" width="158" height="18" rx="9" fill="#0f172a" opacity="0.18"/>
  <rect x="150" y="304" width="192" height="22" rx="11" fill="#0f172a" opacity="0.18"/>
  <rect x="150" y="346" width="216" height="18" rx="9" fill="#0f172a" opacity="0.18"/>
  <rect x="382" y="138" width="16" height="300" rx="8" fill="#7dd3fc"/>
  <rect x="382" y="280" width="16" height="84" rx="8" fill="#22c55e"/>
  <rect x="516" y="84" width="604" height="78" rx="24" fill="#0b1220" stroke="#1e293b" stroke-width="3"/>
  <rect x="550" y="108" width="188" height="30" rx="15" fill="#1e293b"/>
  <rect x="550" y="108" width="126" height="30" rx="15" fill="url(#accent)"/>
  <text x="768" y="128" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="20" font-weight="700">INITIAL PUBLIC RELEASE</text>
  <text x="516" y="246" fill="#f8fafc" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="56" font-weight="700">bitnet-android-lab</text>
  <text x="516" y="304" fill="#38bdf8" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="92" font-weight="800">v0.1.0</text>
  <text x="516" y="356" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="26">Initial public release for the Android Termux BitNet LoRA lab, evidence pack, and live monitoring helpers.</text>
  <rect x="516" y="404" width="192" height="118" rx="24" fill="url(#panel)" opacity="0.92"/>
  <rect x="722" y="404" width="192" height="118" rx="24" fill="#111827"/>
  <rect x="928" y="404" width="192" height="118" rx="24" fill="#111827"/>
  <text x="540" y="448" fill="#e0f2fe" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18" font-weight="700">Evidence-backed lab notes</text>
  <text x="540" y="478" fill="#f8fafc" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="34" font-weight="800">Real-device</text>
  <text x="540" y="506" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18">patches, logs, throughput,</text>
  <text x="540" y="530" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18">and provenance.</text>
  <text x="746" y="448" fill="#7dd3fc" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18" font-weight="700">Monitoring helpers</text>
  <text x="746" y="478" fill="#f8fafc" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="34" font-weight="800">Windows + Termux</text>
  <text x="746" y="506" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18">ADB watcher, per-core bars,</text>
  <text x="746" y="530" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18">gotop, htop, and bmon.</text>
  <text x="952" y="448" fill="#22c55e" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18" font-weight="700">Published docs</text>
  <text x="952" y="478" fill="#f8fafc" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="34" font-weight="800">Bilingual site</text>
  <text x="952" y="506" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18">VitePress docs, CI, and</text>
  <text x="952" y="530" fill="#cbd5e1" font-family="'Segoe UI', 'Noto Sans', sans-serif" font-size="18">GitHub Pages deployment.</text>
</svg>
